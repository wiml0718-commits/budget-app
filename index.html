<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="記帳">
<title>記帳程式</title>
<link rel="stylesheet" href="style.css?v=8">
</head>
<body>
<div class="app">
  <nav class="tabs">
    <button class="tab-btn active" data-tab="daily">每日記帳</button>
    <button class="tab-btn" data-tab="travel">旅遊基金</button>
  </nav>

  <section id="daily" class="tab-panel active">
    <details class="card settings-card">
      <summary>設定</summary>
      <div class="form-row">
        <label>起始日期
          <input type="date" id="startDateInput">
        </label>
        <label>發薪日（每月幾號）
          <input type="number" id="paydayInput" step="1" min="1" max="31">
        </label>
        <label>上班額度
          <input type="number" id="workAllowanceInput" step="1" min="0">
        </label>
        <label>休假額度
          <input type="number" id="offAllowanceInput" step="1" min="0">
        </label>
        <label>每期大餐額度
          <input type="number" id="mealBudgetInput" step="1" min="0">
        </label>
      </div>
      <div class="form-row settings-shift-row">
        <label>班表基準日
          <input type="date" id="shiftAnchorInput">
        </label>
      </div>
      <div class="category-block">
        <span class="category-block-label">基準日班別</span>
        <span class="category-toggle">
          <label><input type="radio" name="shiftAnchorType" value="work"> 上班</label>
          <label><input type="radio" name="shiftAnchorType" value="off" checked> 休假</label>
        </span>
      </div>
      <button id="saveSettingsBtn" class="submit-btn">儲存設定</button>
      <p class="hint-text">額度以發薪日為週期重新計算，不會累積到下一期（第一期依起始日期算部分天數）。班表以基準日起算二休二循環，個別日期可在月曆點選後手動覆寫上班/休假。上班日算 1 餐、休假日算 2 餐，點月曆選日期後可逐餐標記「一般消費/自己煮/大餐」，只有一般消費的餐次會累加進額度；實際花費仍需在下方另外新增並選對類別。額度計算至前一天，當天新增的花費隔天才會反映。</p>
    </details>

    <div class="card balance-card">
      <div class="balance-label" id="balanceLabel">本期累積額度</div>
      <div id="balanceAmount" class="balance-amount">0</div>
      <div id="balanceDetail" class="balance-detail"></div>
      <div id="prevPeriodInfo" class="prev-period-info"></div>
    </div>

    <div class="card balance-card">
      <div class="balance-label" id="mealBalanceLabel">本期大餐額度</div>
      <div id="mealBalanceAmount" class="balance-amount meal">0</div>
      <div id="mealBalanceDetail" class="balance-detail"></div>
      <div id="prevMealPeriodInfo" class="prev-period-info"></div>
    </div>

    <div class="card">
      <h2>新增花費</h2>
      <form id="expenseForm">
        <div class="form-row">
          <label>日期
            <input type="date" id="expenseDate" required>
          </label>
          <label>金額
            <input type="number" id="expenseAmount" step="1" min="0" required>
          </label>
          <label>備註
            <input type="text" id="expenseNote" placeholder="選填">
          </label>
        </div>
        <div class="category-block">
          <span class="category-block-label">類別</span>
          <span class="category-toggle">
            <label><input type="radio" name="expenseCategory" value="daily" checked> 一般花費</label>
            <label><input type="radio" name="expenseCategory" value="meal"> 大餐</label>
          </span>
        </div>
        <button type="submit" class="submit-btn">新增</button>
      </form>
    </div>

    <div class="card">
      <div class="calendar-header">
        <button id="prevMonthBtn" class="cal-nav-btn" type="button">‹</button>
        <h2 id="calendarTitle"></h2>
        <button id="nextMonthBtn" class="cal-nav-btn" type="button">›</button>
      </div>
      <div class="calendar-weekdays">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>

    <div class="card">
      <h2 id="selectedDayLabel">當天花費</h2>
      <div class="shift-control">
        <span id="shiftStatusLabel" class="shift-status-label"></span>
        <span class="shift-toggle">
          <button type="button" id="shiftWorkBtn" class="shift-btn">設為上班</button>
          <button type="button" id="shiftOffBtn" class="shift-btn">設為休假</button>
          <button type="button" id="shiftResetBtn" class="shift-btn shift-reset">還原自動</button>
        </span>
      </div>
      <div class="shift-control">
        <span id="mealCreditLabel" class="shift-status-label"></span>
      </div>
      <div id="mealSlotsContainer" class="meal-slots"></div>
      <ul id="expenseList" class="record-list"></ul>
    </div>
  </section>

  <section id="travel" class="tab-panel">
    <div class="card balance-card">
      <div class="balance-label">旅遊基金累積總額</div>
      <div id="travelTotal" class="balance-amount travel">0</div>
    </div>

    <div class="card">
      <h2>新增紀錄</h2>
      <form id="travelForm" class="form-row">
        <label>日期
          <input type="date" id="travelDate" required>
        </label>
        <label>金額
          <input type="number" id="travelAmount" step="1" min="0" required>
        </label>
        <label>備註
          <input type="text" id="travelNote" placeholder="選填">
        </label>
        <button type="submit">新增</button>
      </form>
    </div>

    <div class="card">
      <h2>基金紀錄</h2>
      <ul id="travelList" class="record-list"></ul>
    </div>
  </section>
</div>
<script src="app.js?v=9"></script>
</body>
</html>
